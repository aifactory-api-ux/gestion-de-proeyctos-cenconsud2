version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cenconsud2
      POSTGRES_USER: cenconsud2_user
      POSTGRES_PASSWORD: supersecret
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cenconsud2_user -d cenconsud2"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    ports:
      - "8011:8001"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=cenconsud2
      - POSTGRES_USER=cenconsud2_user
      - POSTGRES_PASSWORD=supersecret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=change-me
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  project-service:
    build:
      context: ./backend
      dockerfile: project-service/Dockerfile
    ports:
      - "8012:8002"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=cenconsud2
      - POSTGRES_USER=cenconsud2_user
      - POSTGRES_PASSWORD=supersecret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  budget-service:
    build:
      context: ./backend
      dockerfile: budget-service/Dockerfile
    ports:
      - "8013:8003"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=cenconsud2
      - POSTGRES_USER=cenconsud2_user
      - POSTGRES_PASSWORD=supersecret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8014:8004"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=cenconsud2
      - POSTGRES_USER=cenconsud2_user
      - POSTGRES_PASSWORD=supersecret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - AUTH_SERVICE_URL=http://auth-service:8001
      - PROJECT_SERVICE_URL=http://project-service:8002
      - BUDGET_SERVICE_URL=http://budget-service:8003
      - AWS_REGION=us-east-1
      - SAGEMAKER_ENDPOINT=cenconsud2-forecast-prod
      - LOG_LEVEL=INFO
    depends_on:
      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
      budget-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3010:3000"
    depends_on:
      api-gateway:
        condition: service_healthy

networks:
  default:
    name: cenconsud2-network
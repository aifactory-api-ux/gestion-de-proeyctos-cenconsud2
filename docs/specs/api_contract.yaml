# API_CONTRACT.md

## API Gateway (Aggregated Endpoints)

### POST `/forecast`

| Attribute        | Value                        |
|------------------|-----------------------------|
| HTTP Method      | POST                        |
| Path             | /forecast                   |
| Auth Required    | Yes                         |
| Request Body     | `ForecastRequest`           |
| Response        | `ForecastResponse`           |
| Status Codes     | 200, 400, 404, 500          |

#### Request Body: `ForecastRequest`
| Field        | Type    | Required |
|--------------|---------|----------|
| project_id   | int     | Yes      |

#### Response: `ForecastResponse`
| Field           | Type      |
|-----------------|-----------|
| project_id      | int       |
| forecasted_cost | float     |
| confidence      | float     |
| generated_at    | datetime  |

#### Error Response: `ErrorResponse`
| Field   | Type   |
|---------|--------|
| detail  | str    |

---

### GET `/projects/{project_id}`

| Attribute        | Value                        |
|------------------|-----------------------------|
| HTTP Method      | GET                         |
| Path             | /projects/{project_id}      |
| Auth Required    | Yes                         |
| Request Body     | None                        |
| Response         | `Project`                   |
| Status Codes     | 200, 404                    |

#### Response: `Project`
| Field         | Type        |
|---------------|-------------|
| id            | int         |
| name          | str         |
| description   | str (opt)   |
| start_date    | date        |
| end_date      | date        |
| manager_id    | int         |
| status        | str         |

#### Error Response: `ErrorResponse`
| Field   | Type   |
|---------|--------|
| detail  | str    |

